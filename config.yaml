server:
  host: "0.0.0.0"
  port: 8080
  read_timeout: 30s
  write_timeout: 300s   # long timeout — LLM inference takes time

backends:
  - url: "http://localhost:9000"
    weight: 1
  - url: "http://localhost:9001"
    weight: 1

load_balancer:
  strategy: "least_conn"   # round_robin | least_conn

health_check:
  interval: 10s
  timeout: 5s
  path: "/health"

pool:
  max_idle_conns_per_host: 10
  max_conns_per_host: 100
  idle_conn_timeout: 90s
